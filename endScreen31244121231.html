<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src=""></script>
</head>
<body data-site-id = "endScreen">
    <div id="wrap">
        <h1>Nie zamykaj tej strony!!! </h1>
        <h3>Pokaż ja przy stoisku oazowym wtedy odbierzesz nagrodę</h3>
    </div>
    <div id="WykonaneZadania">Wykonane Zadania:</div>
</body>
<script>
let doneTasksList = document.getElementById("WykonaneZadania");
let doneTasks = JSON.parse(localStorage.getItem("DoneTasks")) || [];
doneTasks.sort((a, b) => a - b);
doneTasks.forEach(element => {
    doneTasksList.innerHTML += `<p>Stacja ${element + 1}</p>`;
});

</script>
</html>
